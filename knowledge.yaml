id: messi-sdk
name: Messi SDK
version: 0.8.12-SNAPSHOT
description: |
  Core SDK for the Messi persistent event-streaming platform. Defines the
  provider-agnostic API for producing and consuming ordered, replayable event
  streams. Backend implementations are provided by separate provider modules.
units:
